<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1a3a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="20" opacity="0.85"/>
  <!-- Manette stylisée -->
  <g fill="none" stroke="url(#ring)" stroke-width="22" stroke-linecap="round">
    <!-- D-pad gauche -->
    <line x1="176" y1="256" x2="224" y2="256"/>
    <line x1="200" y1="232" x2="200" y2="280"/>
    <!-- Boutons droite -->
    <circle cx="312" cy="232" r="11" fill="url(#ring)" stroke="none"/>
    <circle cx="336" cy="256" r="11" fill="#f43f5e" stroke="none"/>
    <circle cx="288" cy="256" r="11" fill="#a855f7" stroke="none"/>
    <circle cx="312" cy="280" r="11" fill="#22c55e" stroke="none"/>
  </g>
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="46" fill="#e2e8f0" letter-spacing="2">FS</text>
</svg>
