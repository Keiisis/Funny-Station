<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Funny PSP Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    /* Reset & Hidden styles to ensure 100% invisible emulator UI */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000 !important;
      overflow: hidden;
      font-family: sans-serif;
    }

    #game {
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      background-color: #000 !important;
    }

    /*
     * Hide EmulatorJS control bars and menus AFTER game starts.
     * DO NOT hide generic `button` — EmulatorJS needs its internal start button.
     */
    .ejs--hide-after-start #menu, .ejs--hide-after-start .menu,
    .ejs--hide-after-start #menu-btn, .ejs--hide-after-start .menu-btn,
    .ejs--hide-after-start .ejs-control-bar,
    .ejs--hide-after-start .ejs-menu,
    .ejs--hide-after-start div[class*="bar"] {
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
      visibility: hidden !important;
    }

    /* Conteneurs : plein écran noir + centrage du canvas (letterbox). */
    div#game, div#game-container, div#player {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      position: absolute !important;
      inset: 0 !important;
      background: #000 !important;
      z-index: 1 !important;
    }

    /*
     * Canvas : ratio natif PSP (480x272) PRÉSERVÉ — agrandi au max sans déformation.
     * L'ancien width/height:100% étirait l'image (flou). height:100% + width:auto = net.
     */
    canvas, #canvas, .canvas {
      display: block !important;
      width: auto !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      margin: auto !important;
      object-fit: contain !important;
      image-rendering: -moz-crisp-edges !important;
      image-rendering: -webkit-crisp-edges !important;
      image-rendering: pixelated !important;
      image-rendering: crisp-edges !important;
    }

    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease-out;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #a855f7;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <div id="progress-label" style="font-size: 11px; color: #a1a1aa; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; max-width: 80%; line-height: 1.5;">Démarrage de l'émulateur PSP...</div>
    <div style="width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 12px; overflow: hidden;">
      <div id="progress-bar" style="width: 0%; height: 100%; background: #a855f7; transition: width 0.1s ease;"></div>
    </div>
  </div>

  <div id="game"></div>

  <script>
    // 0. Force override of video settings in localStorage to prevent cached blurry settings
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && (key.startsWith('ejs-') || key === 'ejs-settings')) {
          try {
            const val = localStorage.getItem(key);
            if (val) {
              const parsed = JSON.parse(val);
              if (parsed && parsed.settings) {
                parsed.settings['video_smooth'] = 'false';
                parsed.settings['video_scale_integer'] = 'true';
                localStorage.setItem(key, JSON.stringify(parsed));
              }
            }
          } catch (e) {}
        }
      }
    } catch (e) {}

    // 1. Monkeypatch WebGL texture & sampler filtering to force nearest-neighbor (sharp pixels)
    (function() {
      function patchWebGL(ctxPrototype) {
        if (!ctxPrototype) return;

        // IMPORTANT : EmulatorJS/RetroArch s'appuie souvent sur le filtre LINEAR PAR DÉFAUT
        // (sans appeler texParameteri) → l'upscale est flou. On force donc NEAREST après
        // CHAQUE création de texture. C'est ce qui rend réellement l'image nette (pixel art).
        const origTexImage2D = ctxPrototype.texImage2D;
        if (origTexImage2D) {
          ctxPrototype.texImage2D = function() {
            const r = origTexImage2D.apply(this, arguments);
            try {
              this.texParameteri(this.TEXTURE_2D, this.TEXTURE_MIN_FILTER, this.NEAREST);
              this.texParameteri(this.TEXTURE_2D, this.TEXTURE_MAG_FILTER, this.NEAREST);
            } catch (e) {}
            return r;
          };
        }

        const originalTexParameteri = ctxPrototype.texParameteri;
        ctxPrototype.texParameteri = function(target, pname, param) {
          if (pname === this.TEXTURE_MIN_FILTER) {
            if (param === this.LINEAR) param = this.NEAREST;
            else if (param === this.LINEAR_MIPMAP_NEAREST) param = this.NEAREST_MIPMAP_NEAREST;
            else if (param === this.NEAREST_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
            else if (param === this.LINEAR_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
          } else if (pname === this.TEXTURE_MAG_FILTER) {
            if (param === this.LINEAR) param = this.NEAREST;
          }
          return originalTexParameteri.call(this, target, pname, param);
        };

        const originalTexParameterf = ctxPrototype.texParameterf;
        ctxPrototype.texParameterf = function(target, pname, param) {
          if (pname === this.TEXTURE_MIN_FILTER) {
            if (param === this.LINEAR) param = this.NEAREST;
            else if (param === this.LINEAR_MIPMAP_NEAREST) param = this.NEAREST_MIPMAP_NEAREST;
            else if (param === this.NEAREST_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
            else if (param === this.LINEAR_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
          } else if (pname === this.TEXTURE_MAG_FILTER) {
            if (param === this.LINEAR) param = this.NEAREST;
          }
          return originalTexParameterf.call(this, target, pname, param);
        };

        const originalSamplerParameteri = ctxPrototype.samplerParameteri;
        if (originalSamplerParameteri) {
          ctxPrototype.samplerParameteri = function(sampler, pname, param) {
            if (pname === this.TEXTURE_MIN_FILTER) {
              if (param === this.LINEAR) param = this.NEAREST;
              else if (param === this.LINEAR_MIPMAP_NEAREST) param = this.NEAREST_MIPMAP_NEAREST;
              else if (param === this.NEAREST_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
              else if (param === this.LINEAR_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
            } else if (pname === this.TEXTURE_MAG_FILTER) {
              if (param === this.LINEAR) param = this.NEAREST;
            }
            return originalSamplerParameteri.call(this, sampler, pname, param);
          };
        }

        const originalSamplerParameterf = ctxPrototype.samplerParameterf;
        if (originalSamplerParameterf) {
          ctxPrototype.samplerParameterf = function(sampler, pname, param) {
            if (pname === this.TEXTURE_MIN_FILTER) {
              if (param === this.LINEAR) param = this.NEAREST;
              else if (param === this.LINEAR_MIPMAP_NEAREST) param = this.NEAREST_MIPMAP_NEAREST;
              else if (param === this.NEAREST_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
              else if (param === this.LINEAR_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
            } else if (pname === this.TEXTURE_MAG_FILTER) {
              if (param === this.LINEAR) param = this.NEAREST;
            }
            return originalSamplerParameterf.call(this, sampler, pname, param);
          };
        }
      }

      if (typeof WebGLRenderingContext !== 'undefined') {
        patchWebGL(WebGLRenderingContext.prototype);
      }
      if (typeof WebGL2RenderingContext !== 'undefined') {
        patchWebGL(WebGL2RenderingContext.prototype);
      }
    })();

    // 2. Periodic Canvas Style & Context Image Smoothing Enforcer
    setInterval(() => {
      const canvases = document.querySelectorAll('canvas');
      canvases.forEach(canvas => {
        if (canvas.style.imageRendering !== 'pixelated') {
          canvas.style.setProperty('image-rendering', 'pixelated', 'important');
        }
        try {
          const ctx = canvas.getContext('2d');
          if (ctx && ctx.imageSmoothingEnabled !== false) {
            ctx.imageSmoothingEnabled = false;
            ctx.mozImageSmoothingEnabled = false;
            ctx.webkitImageSmoothingEnabled = false;
            ctx.msImageSmoothingEnabled = false;
          }
        } catch (e) {}
      });
    }, 250);

    // Parse the ROM URL from query parameters
    const urlParams = new URLSearchParams(window.location.search);
    const romUrl = urlParams.get('rom');

    if (!romUrl) {
      document.getElementById('progress-label').innerText = "Erreur : URL de ROM manquante.";
      console.error("[PSP Runner] ROM URL parameter is missing.");
    } else {
      const isCso = romUrl.toLowerCase().endsWith('.cso');
      const fileHint = isCso ? '#game.cso' : '#game.iso';
      
      // Configure EmulatorJS — stream directly from Worker
      window.EJS_player = '#game';
      window.EJS_core = 'psp';
      window.EJS_gameUrl = romUrl + fileHint;
      window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
      window.EJS_startOnLoaded = true;
      // Threads désactivés : le cœur PSP multi-threadé du CDN échoue souvent à s'initialiser
      // (→ télécharge mais ne démarre pas). Le mono-thread est fiable. À ré-activer plus tard.
      window.EJS_threads = false;
      window.EJS_defaultOptions = {
        'video_smooth': 'false',
        'video_scale_integer': 'true'
      };

      // Hide all UI buttons
      window.EJS_Buttons = {
        playPause: false,
        restart: false,
        mute: false,
        volume: false,
        fullscreen: false,
        saveState: false,
        loadState: false,
        settings: false,
        screenshot: false,
        quickSave: false,
        quickLoad: false,
        cheats: false,
        slowMotion: false,
        fastForward: false,
        gamepad: false,
        loadLocalState: false,
        saveLocalState: false
      };

      // Define default keyboard mappings
      window.EJS_defaultControls = {
        0: { // Player 1
          0: { value: 'x' },         // Cross (✕) / Confirm
          1: { value: 's' },         // Square (■)
          2: { value: 'Shift' },     // Select
          3: { value: 'Enter' },     // Start
          4: { value: 'ArrowUp' },   // D-Pad Up
          5: { value: 'ArrowDown' }, // D-Pad Down
          6: { value: 'ArrowLeft' }, // D-Pad Left
          7: { value: 'ArrowRight' },// D-Pad Right
          8: { value: 'z' },         // Circle (◯) / Cancel
          9: { value: 'a' },         // Triangle (▲)
          10: { value: 'q' },        // L Shoulder trigger
          11: { value: 'e' }         // R Shoulder trigger
        }
      };

      window.EJS_gamepadButtonMap = {};
      window.EJS_mouse = false;

      // Hide loading screen once emulator is active
      window.EJS_onGameStart = function() {
        console.log("[PSP Runner] Emulator started.");
        const loader = document.getElementById('loading');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 500);
        }
        document.body.classList.add('ejs--hide-after-start');
        window.parent.postMessage({ type: 'FUNNY_BUS_GAME_READY' }, '*');
      };

      // ── Diagnostic : surface la vraie cause si le moteur ne démarre pas ──
      let __started = false;
      const __origStart = window.EJS_onGameStart;
      window.EJS_onGameStart = function () { __started = true; if (__origStart) return __origStart.apply(this, arguments); };
      const showErr = (msg) => { if (progressLabel) progressLabel.innerText = 'Erreur moteur : ' + msg; console.error('[PSP Runner]', msg); };
      window.addEventListener('error', (e) => showErr((e && (e.message || (e.error && e.error.message))) || 'erreur inconnue'));
      window.addEventListener('unhandledrejection', (e) => showErr((e && e.reason && (e.reason.message || e.reason)) || 'promesse rejetée'));
      window.EJS_onLoadError = (err) => showErr(typeof err === 'string' ? err : (err && err.message) || 'échec de chargement du cœur');
      setTimeout(() => {
        if (!__started && progressLabel && progressLabel.innerText.indexOf('Erreur') === -1) {
          showErr('le cœur PSP ne démarre pas (voir la console). Téléchargement OK mais init KO.');
        }
      }, 30000);

      // Append the EmulatorJS loader script
      const script = document.createElement('script');
      script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
      document.body.appendChild(script);
    }
  </script>

  <!-- Pont d'entrée Funny Station → EmulatorJS : API native simulateInput (fiable),
       avec secours clavier. Reçoit { type:'FUNNY_EMU_INPUT', index, pressed } du parent. -->
  <script>
    (function () {
      var FB = { 0:'z', 1:'a', 2:'shift', 3:'enter', 4:'arrowup', 5:'arrowdown', 6:'arrowleft', 7:'arrowright', 8:'x', 9:'s', 10:'q', 11:'e' };
      function sim(index, pressed) {
        try {
          var emu = window.EJS_emulator;
          if (emu && emu.gameManager && emu.gameManager.functions && typeof emu.gameManager.functions.simulateInput === 'function') {
            emu.gameManager.functions.simulateInput(0, index, pressed ? 1 : 0);
            return;
          }
        } catch (e) {}
        var key = FB[index]; if (!key) return;
        var evt = new KeyboardEvent(pressed ? 'keydown' : 'keyup', { key: key, code: key, bubbles: true, cancelable: true });
        (document.activeElement || document).dispatchEvent(evt); document.dispatchEvent(evt); window.dispatchEvent(evt);
      }
      window.addEventListener('message', function (ev) {
        var d = ev.data;
        if (d && d.type === 'FUNNY_EMU_INPUT') sim(d.index, d.pressed);
      });
    })();
  </script>
</body>
</html>
