<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Top Down Horror Survival</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      /* Full-bleed canvas for FunnyStation iframe embedding */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #unity-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        background: #000;
      }
      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: none;
      }
      #unity-progress-bar-empty {
        width: 240px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        border-radius: 2px;
        transition: width 0.3s ease;
      }
      #unity-warning {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
      }
      /* Hide the default Unity footer */
      #unity-footer {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px; color: #fff; border-radius: 4px;';
        else {
          if (type == 'warning') div.style = 'background: #eab308; padding: 10px; color: #000; border-radius: 4px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/top-down-horror.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/top-down-horror.data.gz",
        frameworkUrl: buildUrl + "/top-down-horror.framework.js.gz",
        codeUrl: buildUrl + "/top-down-horror.wasm.gz",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "FunnyStation",
        productName: "Top Down Horror Survival",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // Always fill the entire viewport (FunnyStation iframe)
      canvas.style.width = "100%";
      canvas.style.height = "100%";

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          // Notify FunnyStation parent that the game is ready
          if (window.parent !== window) {
            window.parent.postMessage({ type: 'FUNNY_BUS_GAME_READY' }, '*');
          }
        }).catch((message) => {
          console.error("[Unity] Failed to load:", message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
