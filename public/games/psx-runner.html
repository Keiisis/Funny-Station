<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Funny PS1 Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    /* Reset & Hidden styles to ensure 100% invisible emulator UI */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000 !important;
      overflow: hidden;
      font-family: sans-serif;
    }

    #game {
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      background-color: #000 !important;
    }

    /*
     * Hide EmulatorJS control bars and menus AFTER game starts.
     * DO NOT hide generic `button` — EmulatorJS needs its internal start button.
     */
    .ejs--hide-after-start #menu, .ejs--hide-after-start .menu,
    .ejs--hide-after-start #menu-btn, .ejs--hide-after-start .menu-btn,
    .ejs--hide-after-start .ejs-control-bar,
    .ejs--hide-after-start .ejs-menu,
    .ejs--hide-after-start div[class*="bar"] {
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
      visibility: hidden !important;
    }

    /* Conteneurs : plein écran noir + centrage du canvas (letterbox). */
    div#game, div#game-container, div#player {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      position: absolute !important;
      inset: 0 !important;
      background: #000 !important;
      z-index: 1 !important;
    }

    /*
     * Canvas : ratio natif PSP (480x272) PRÉSERVÉ — agrandi au max sans déformation.
     * L'ancien width/height:100% étirait l'image (flou). height:100% + width:auto = net.
     */
    canvas, #canvas, .canvas {
      display: block !important;
      width: auto !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      margin: auto !important;
      object-fit: contain !important;
      image-rendering: -moz-crisp-edges !important;
      image-rendering: -webkit-crisp-edges !important;
      image-rendering: pixelated !important;
      image-rendering: crisp-edges !important;
    }

    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease-out;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #a855f7;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <div id="progress-label" style="font-size: 11px; color: #a1a1aa; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; max-width: 80%; line-height: 1.5;">Démarrage de l'émulateur PS1...</div>
    <div style="width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 12px; overflow: hidden;">
      <div id="progress-bar" style="width: 0%; height: 100%; background: #a855f7; transition: width 0.1s ease;"></div>
    </div>
  </div>

  <div id="game"></div>

  <script>
    // 0. Force override of video settings in localStorage to prevent cached blurry settings
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && (key.startsWith('ejs-') || key === 'ejs-settings')) {
          try {
            const val = localStorage.getItem(key);
            if (val) {
              const parsed = JSON.parse(val);
              if (parsed && parsed.settings) {
                parsed.settings['video_smooth'] = 'false';
                parsed.settings['video_scale_integer'] = 'true';
                localStorage.setItem(key, JSON.stringify(parsed));
              }
            }
          } catch (e) {}
        }
      }
    } catch (e) {}

    // 1. Monkeypatch WebGL texture & sampler filtering to force nearest-neighbor (sharp pixels)
    (function() {
      function patchWebGL(ctxPrototype) {
        if (!ctxPrototype) return;
        
        const originalTexParameteri = ctxPrototype.texParameteri;
        ctxPrototype.texParameteri = function(target, pname, param) {
          if (pname === this.TEXTURE_MIN_FILTER) {
            if (param === this.LINEAR) param = this.NEAREST;
            else if (param === this.LINEAR_MIPMAP_NEAREST) param = this.NEAREST_MIPMAP_NEAREST;
            else if (param === this.NEAREST_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
            else if (param === this.LINEAR_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
          } else if (pname === this.TEXTURE_MAG_FILTER) {
            if (param === this.LINEAR) param = this.NEAREST;
          }
          return originalTexParameteri.call(this, target, pname, param);
        };

        const originalTexParameterf = ctxPrototype.texParameterf;
        ctxPrototype.texParameterf = function(target, pname, param) {
          if (pname === this.TEXTURE_MIN_FILTER) {
            if (param === this.LINEAR) param = this.NEAREST;
            else if (param === this.LINEAR_MIPMAP_NEAREST) param = this.NEAREST_MIPMAP_NEAREST;
            else if (param === this.NEAREST_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
            else if (param === this.LINEAR_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
          } else if (pname === this.TEXTURE_MAG_FILTER) {
            if (param === this.LINEAR) param = this.NEAREST;
          }
          return originalTexParameterf.call(this, target, pname, param);
        };

        const originalSamplerParameteri = ctxPrototype.samplerParameteri;
        if (originalSamplerParameteri) {
          ctxPrototype.samplerParameteri = function(sampler, pname, param) {
            if (pname === this.TEXTURE_MIN_FILTER) {
              if (param === this.LINEAR) param = this.NEAREST;
              else if (param === this.LINEAR_MIPMAP_NEAREST) param = this.NEAREST_MIPMAP_NEAREST;
              else if (param === this.NEAREST_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
              else if (param === this.LINEAR_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
            } else if (pname === this.TEXTURE_MAG_FILTER) {
              if (param === this.LINEAR) param = this.NEAREST;
            }
            return originalSamplerParameteri.call(this, sampler, pname, param);
          };
        }

        const originalSamplerParameterf = ctxPrototype.samplerParameterf;
        if (originalSamplerParameterf) {
          ctxPrototype.samplerParameterf = function(sampler, pname, param) {
            if (pname === this.TEXTURE_MIN_FILTER) {
              if (param === this.LINEAR) param = this.NEAREST;
              else if (param === this.LINEAR_MIPMAP_NEAREST) param = this.NEAREST_MIPMAP_NEAREST;
              else if (param === this.NEAREST_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
              else if (param === this.LINEAR_MIPMAP_LINEAR) param = this.NEAREST_MIPMAP_NEAREST;
            } else if (pname === this.TEXTURE_MAG_FILTER) {
              if (param === this.LINEAR) param = this.NEAREST;
            }
            return originalSamplerParameterf.call(this, sampler, pname, param);
          };
        }
      }

      if (typeof WebGLRenderingContext !== 'undefined') {
        patchWebGL(WebGLRenderingContext.prototype);
      }
      if (typeof WebGL2RenderingContext !== 'undefined') {
        patchWebGL(WebGL2RenderingContext.prototype);
      }
    })();

    // 2. Periodic Canvas Style & Context Image Smoothing Enforcer
    setInterval(() => {
      const canvases = document.querySelectorAll('canvas');
      canvases.forEach(canvas => {
        if (canvas.style.imageRendering !== 'pixelated') {
          canvas.style.setProperty('image-rendering', 'pixelated', 'important');
        }
        try {
          const ctx = canvas.getContext('2d');
          if (ctx && ctx.imageSmoothingEnabled !== false) {
            ctx.imageSmoothingEnabled = false;
            ctx.mozImageSmoothingEnabled = false;
            ctx.webkitImageSmoothingEnabled = false;
            ctx.msImageSmoothingEnabled = false;
          }
        } catch (e) {}
      });
    }, 250);

    // Parse the ROM URL from query parameters
    const urlParams = new URLSearchParams(window.location.search);
    const romUrl = urlParams.get('rom');

    if (!romUrl) {
      document.getElementById('progress-label').innerText = "Erreur : URL de ROM manquante.";
      console.error("[PS1 Runner] ROM URL parameter is missing.");
    } else {
      const progressLabel = document.getElementById('progress-label');
      const progressBar = document.getElementById('progress-bar');
      
      const isPbp = romUrl.toLowerCase().endsWith('.pbp');
      const isCue = romUrl.toLowerCase().endsWith('.cue');
      let fetchUrl = romUrl;
      let binFileName = "";
      
      const startPreloading = async () => {
        try {
          if (isPbp) {
            // PBP files are self-contained EBOOT — download directly, no CUE parsing needed
            console.log("[PS1 Runner] PBP format detected, direct download:", romUrl);
            fetchUrl = romUrl;
          } else if (isCue) {
            progressLabel.innerText = "Lecture du descripteur CUE...";
            const cueResponse = await fetch(romUrl);
            if (!cueResponse.ok) throw new Error("Impossible de lire le fichier .cue");
            const cueText = await cueResponse.text();
            
            // Extract the .bin filename
            const match = cueText.match(/FILE\s+"([^"]+)"\s+BINARY/i);
            if (match && match[1]) {
              binFileName = match[1];
              // Resolve relative to cue directory
              const lastSlash = romUrl.lastIndexOf('/');
              const basePath = lastSlash !== -1 ? romUrl.substring(0, lastSlash + 1) : "";
              fetchUrl = basePath + binFileName;
              console.log("[PS1 Runner] Parsed .bin from .cue:", fetchUrl);
            } else {
              console.warn("[PS1 Runner] No BINARY file found in .cue, falling back to direct .cue loading");
            }
          }
          
          progressLabel.innerText = "Initialisation du téléchargement...";
          const response = await fetch(fetchUrl);
          if (!response.ok) throw new Error(`Erreur réseau: ${response.status} ${response.statusText}`);
          
          const contentLength = response.headers.get('content-length');
          const total = parseInt(contentLength || '0', 10);
          let loaded = 0;
          
          const reader = response.body.getReader();
          const chunks = [];
          
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            chunks.push(value);
            loaded += value.byteLength;
            
            if (total > 0) {
              const pct = Math.round((loaded / total) * 100);
              progressLabel.innerText = `Téléchargement : ${pct}% (${(loaded / (1024*1024)).toFixed(1)} Mo / ${(total / (1024*1024)).toFixed(1)} Mo)`;
              if (progressBar) progressBar.style.width = `${pct}%`;
            } else {
              progressLabel.innerText = `Téléchargement : ${(loaded / (1024*1024)).toFixed(1)} Mo`;
            }
          }
          
          progressLabel.innerText = "Création du cache de jeu...";
          const blob = new Blob(chunks, { type: 'application/octet-stream' });
          const blobUrl = URL.createObjectURL(blob);
          
          progressLabel.innerText = "Démarrage de l'émulateur PS1...";
          if (progressBar) progressBar.style.width = '100%';
          
          // Configure EmulatorJS — PBP needs #game.pbp hint, BIN needs #game.bin
          const fileHint = isPbp ? '#game.pbp' : '#game.bin';
          window.EJS_player = '#game';
          window.EJS_core = 'psx';
          window.EJS_gameUrl = blobUrl + fileHint;
          window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
          window.EJS_startOnLoaded = true;
          window.EJS_threads = (typeof crossOriginIsolated !== 'undefined' && crossOriginIsolated);
          window.EJS_defaultOptions = {
            'video_smooth': 'false',
            'video_scale_integer': 'true'
          };
          
          window.EJS_Buttons = {
            playPause: false,
            restart: false,
            mute: false,
            volume: false,
            fullscreen: false,
            saveState: false,
            loadState: false,
            settings: false,
            screenshot: false,
            quickSave: false,
            quickLoad: false,
            cheats: false,
            slowMotion: false,
            fastForward: false,
            gamepad: false,
            loadLocalState: false,
            saveLocalState: false
          };
          
          window.EJS_defaultControls = {
            0: { // Player 1
              0: { value: 'x' },         // Cross (✕) / Confirm
              1: { value: 's' },         // Square (■)
              2: { value: 'Shift' },     // Select
              3: { value: 'Enter' },     // Start
              4: { value: 'ArrowUp' },   // D-Pad Up
              5: { value: 'ArrowDown' }, // D-Pad Down
              6: { value: 'ArrowLeft' }, // D-Pad Left
              7: { value: 'ArrowRight' },// D-Pad Right
              8: { value: 'z' },         // Circle (◯) / Cancel
              9: { value: 'a' },         // Triangle (▲)
              10: { value: 'q' },        // L Shoulder trigger
              11: { value: 'e' }         // R Shoulder trigger
            }
          };
          
          window.EJS_gamepadButtonMap = {};
          window.EJS_mouse = false;
          
          window.EJS_onGameStart = function() {
            console.log("[PS1 Runner] Emulator started.");
            const loader = document.getElementById('loading');
            if (loader) {
              loader.style.opacity = '0';
              setTimeout(() => {
                loader.style.display = 'none';
              }, 500);
            }
            document.body.classList.add('ejs--hide-after-start');
            window.parent.postMessage({ type: 'FUNNY_BUS_GAME_READY' }, '*');
          };
          
          // Append the EmulatorJS loader script
          const script = document.createElement('script');
          script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
          document.body.appendChild(script);
          
        } catch (err) {
          progressLabel.innerText = `Erreur de chargement : ${err.message}`;
          console.error(err);
        }
      };
      
      startPreloading();
    }
  </script>
</body>
</html>
